name: Keep Repository Active

on:
  # 每 50 天执行一次（GitHub Actions 会在 60 天无活动后禁用）
  schedule:
    - cron: '0 0 */50 * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 保持仓库活跃
        run: |
          echo "Repository is active at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/.keep-alive

      - name: 提交活跃标记
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/.keep-alive
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: keep repository active"
          git push
