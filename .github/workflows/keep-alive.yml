name: Keep Repository Active

on:
  # 每 6 小时执行一次，保持 GitHub Actions 调度器活跃
  # 参考 nvidia 仓库的保活策略
  schedule:
    - cron: '0 */6 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 保持 Actions 活跃
        run: |
          echo "✅ Keep-alive ping at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📊 This workflow runs every 6 hours to keep GitHub Actions scheduler active"
          echo "🎯 Ensures scheduled workflows (like refresh.yml) continue to run reliably"
