name: 生成定时配置

on:
  workflow_dispatch:
    inputs:
      schedule_time_1:
        description: '第一次执行时间（北京时间，24小时制）'
        required: true
        default: '09:00'
        type: choice
        options:
          - '06:00'
          - '06:30'
          - '07:00'
          - '07:30'
          - '08:00'
          - '08:30'
          - '09:00'
          - '09:30'
          - '10:00'
          - '10:30'
          - '11:00'
          - '11:30'
          - '12:00'
          - '12:30'
          - '13:00'
          - '13:30'
          - '14:00'
          - '14:30'
          - '15:00'
          - '15:30'
          - '16:00'
          - '16:30'
          - '17:00'
          - '17:30'
          - '18:00'
          - '18:30'
          - '19:00'
          - '19:30'
          - '20:00'
          - '20:30'
          - '21:00'
          - '21:30'
          - '22:00'
          - '22:30'
          - '23:00'
          - '23:30'
      schedule_time_2:
        description: '第二次执行时间（北京时间，24小时制）'
        required: true
        default: '21:00'
        type: choice
        options:
          - '06:00'
          - '06:30'
          - '07:00'
          - '07:30'
          - '08:00'
          - '08:30'
          - '09:00'
          - '09:30'
          - '10:00'
          - '10:30'
          - '11:00'
          - '11:30'
          - '12:00'
          - '12:30'
          - '13:00'
          - '13:30'
          - '14:00'
          - '14:30'
          - '15:00'
          - '15:30'
          - '16:00'
          - '16:30'
          - '17:00'
          - '17:30'
          - '18:00'
          - '18:30'
          - '19:00'
          - '19:30'
          - '20:00'
          - '20:30'
          - '21:00'
          - '21:30'
          - '22:00'
          - '22:30'
          - '23:00'
          - '23:30'

jobs:
  generate-config:
    runs-on: ubuntu-latest

    steps:
      - name: 转换北京时间到 UTC
        id: convert
        run: |
          # 转换第一个时间
          BJ_TIME_1="${{ inputs.schedule_time_1 }}"
          BJ_HOUR_1=$(echo "$BJ_TIME_1" | cut -d':' -f1)
          BJ_MIN_1=$(echo "$BJ_TIME_1" | cut -d':' -f2)

          UTC_HOUR_1=$((BJ_HOUR_1 - 8))
          UTC_MIN_1=$BJ_MIN_1

          if [ $UTC_HOUR_1 -lt 0 ]; then
            UTC_HOUR_1=$((UTC_HOUR_1 + 24))
          fi

          # 转换第二个时间
          BJ_TIME_2="${{ inputs.schedule_time_2 }}"
          BJ_HOUR_2=$(echo "$BJ_TIME_2" | cut -d':' -f1)
          BJ_MIN_2=$(echo "$BJ_TIME_2" | cut -d':' -f2)

          UTC_HOUR_2=$((BJ_HOUR_2 - 8))
          UTC_MIN_2=$BJ_MIN_2

          if [ $UTC_HOUR_2 -lt 0 ]; then
            UTC_HOUR_2=$((UTC_HOUR_2 + 24))
          fi

          echo "utc_hour_1=$UTC_HOUR_1" >> $GITHUB_OUTPUT
          echo "utc_min_1=$UTC_MIN_1" >> $GITHUB_OUTPUT
          echo "utc_hour_2=$UTC_HOUR_2" >> $GITHUB_OUTPUT
          echo "utc_min_2=$UTC_MIN_2" >> $GITHUB_OUTPUT

      - name: 显示配置说明
        run: |
          UTC_HOUR_1="${{ steps.convert.outputs.utc_hour_1 }}"
          UTC_MIN_1="${{ steps.convert.outputs.utc_min_1 }}"
          UTC_HOUR_2="${{ steps.convert.outputs.utc_hour_2 }}"
          UTC_MIN_2="${{ steps.convert.outputs.utc_min_2 }}"

          echo "============================================================"
          echo "📅 你选择的执行时间"
          echo "============================================================"
          echo ""
          echo "北京时间："
          echo "  第一次：${{ inputs.schedule_time_1 }}"
          echo "  第二次：${{ inputs.schedule_time_2 }}"
          echo ""
          echo "对应 UTC 时间："
          echo "  第一次：$UTC_HOUR_1:$UTC_MIN_1"
          echo "  第二次：$UTC_HOUR_2:$UTC_MIN_2"
          echo ""
          echo "============================================================"
          echo "📝 如何更新定时执行时间"
          echo "============================================================"
          echo ""
          echo "请按以下步骤操作："
          echo ""
          echo "1. 进入仓库主页"
          echo ""
          echo "2. 点击 .github/workflows/refresh.yml 文件"
          echo ""
          echo "3. 点击编辑按钮（铅笔图标）"
          echo ""
          echo "4. 找到第 12-13 行的 schedule 部分，修改为："
          echo ""
          echo "  schedule:"
          echo "    - cron: '$UTC_MIN_1 $UTC_HOUR_1 * * *'"
          echo "    - cron: '$UTC_MIN_2 $UTC_HOUR_2 * * *'"
          echo ""
          echo "5. 点击 'Commit changes...'"
          echo ""
          echo "6. 填写提交信息：更新定时执行时间为北京时间 ${{ inputs.schedule_time_1 }} 和 ${{ inputs.schedule_time_2 }}"
          echo ""
          echo "7. 点击 'Commit changes' 完成"
          echo ""
          echo "============================================================"
          echo "💡 提示"
          echo "============================================================"
          echo ""
          echo "- 修改后立即生效"
          echo "- 建议两次执行间隔至少 8 小时（京东冷却期）"
          echo "- 可以随时回到这里重新生成配置"
          echo ""
          echo "============================================================"
          echo "📋 完整的 schedule 配置（复制使用）"
          echo "============================================================"
          echo ""
          echo "  schedule:"
          echo "    - cron: '$UTC_MIN_1 $UTC_HOUR_1 * * *'"
          echo "    - cron: '$UTC_MIN_2 $UTC_HOUR_2 * * *'"
          echo ""
          echo "============================================================"
