name: 京东校园招聘活跃度刷新

on:
  # GitHub Actions 使用 UTC。下面两个时间对应北京时间 UTC+8：
  # - 01:20/25/30/35/40/45 UTC = 09:20-09:45 北京时间
  # - 09:20/25/30/35/40/45 UTC = 17:20-17:45 北京时间
  #
  # 注意：GitHub Actions 定时任务可能延迟，不提供准点 SLA。
  # 多次唤起用于抵抗调度延迟，真正是否发送京东请求由 refresh.py
  # 再按北京时间 09:30/17:30 的安全窗口和状态文件判断。
  schedule:
    - cron: '20,25,30,35,40,45 1,9 * * *'

  workflow_dispatch:

concurrency:
  group: jd-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 恢复刷新状态
        uses: actions/cache@v4
        with:
          path: .refresh-state
          key: refresh-state-${{ github.run_id }}
          restore-keys: |
            refresh-state-

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 执行刷新任务
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: |
          python refresh.py

      - name: 上传刷新状态
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-state-${{ github.run_number }}
          path: .refresh-state
          include-hidden-files: true
          retention-days: 14
