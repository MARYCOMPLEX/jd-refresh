name: 京东校园招聘活跃度刷新

on:
  # 定时执行 - 多时间点冗余，应对 GitHub Actions 调度延迟
  # GitHub Actions 在高峰期可能延迟数小时，设置多个时间点确保执行
  # 格式：分 时 日 月 周 (使用 UTC 时间，北京时间需要 -8 小时)
  #
  # 策略：每 6 小时一个时间点，错开整点避免高峰
  # - 17 0 * * *   => 北京时间 08:17
  # - 17 6 * * *   => 北京时间 14:17
  # - 17 12 * * *  => 北京时间 20:17
  # - 17 18 * * *  => 北京时间 02:17（次日凌晨）
  schedule:
    - cron: '17 0 * * *'   # 北京 08:17
    - cron: '17 6 * * *'   # 北京 14:17
    - cron: '17 12 * * *'  # 北京 20:17
    - cron: '17 18 * * *'  # 北京 02:17

  # 允许手动触发，支持自定义参数
  workflow_dispatch:
    inputs:
      schedule_time_1:
        description: '第一次执行时间（北京时间，24小时制）'
        required: false
        default: '09:00'
        type: choice
        options:
          - '06:00'
          - '06:30'
          - '07:00'
          - '07:30'
          - '08:00'
          - '08:30'
          - '09:00'
          - '09:30'
          - '10:00'
          - '10:30'
          - '11:00'
          - '11:30'
          - '12:00'
          - '12:30'
          - '13:00'
          - '13:30'
          - '14:00'
          - '14:30'
          - '15:00'
          - '15:30'
          - '16:00'
          - '16:30'
          - '17:00'
          - '17:30'
          - '18:00'
          - '18:30'
          - '19:00'
          - '19:30'
          - '20:00'
          - '20:30'
          - '21:00'
          - '21:30'
          - '22:00'
          - '22:30'
          - '23:00'
          - '23:30'
      schedule_time_2:
        description: '第二次执行时间（北京时间，24小时制）'
        required: false
        default: '21:00'
        type: choice
        options:
          - '06:00'
          - '06:30'
          - '07:00'
          - '07:30'
          - '08:00'
          - '08:30'
          - '09:00'
          - '09:30'
          - '10:00'
          - '10:30'
          - '11:00'
          - '11:30'
          - '12:00'
          - '12:30'
          - '13:00'
          - '13:30'
          - '14:00'
          - '14:30'
          - '15:00'
          - '15:30'
          - '16:00'
          - '16:30'
          - '17:00'
          - '17:30'
          - '18:00'
          - '18:30'
          - '19:00'
          - '19:30'
          - '20:00'
          - '20:30'
          - '21:00'
          - '21:30'
          - '22:00'
          - '22:30'
          - '23:00'
          - '23:30'
      run_now:
        description: '立即执行一次刷新（忽略上面的时间设置）'
        required: false
        default: 'true'
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 执行刷新任务
        env:
          JD_COOKIE: ${{ secrets.JD_COOKIE }}
        run: |
          python refresh.py

      - name: 显示时间设置提示
        if: github.event_name == 'workflow_dispatch' && !inputs.run_now
        run: |
          echo "📅 你设置的执行时间："
          echo "  第一次：北京时间 ${{ inputs.schedule_time_1 }}"
          echo "  第二次：北京时间 ${{ inputs.schedule_time_2 }}"
          echo ""
          echo "⚠️ 注意：这些时间仅供参考，实际定时执行仍使用 workflow 文件中的 cron 表达式"
          echo "💡 如需修改定时执行时间，请编辑 .github/workflows/refresh.yml 文件"

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
